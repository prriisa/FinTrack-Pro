<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FinTrack Pro</title>
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>
    <register>
        <div class="login-container">
            <h1>Create Account</h1>
            <p>Join FinTrack Pro</p>
            <form action="">
                <label for="username">Choose a Username</label>
                <input required type="text" id="username" placeholder="Create Username">
                <label for="password">Password</label>
                <input required type="text" id="password" placeholder="Create Password">
                <input type="submit" value="Register" style="background-color: #28A745;">
                <p>Already have an account? <a href="../login/login.html">Login here</a></p>
            </form>
        </div>
    </register>
    <script src="../assets/js/main.js"></script>
</body>
</html>
